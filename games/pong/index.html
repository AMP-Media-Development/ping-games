<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>Ping Pong</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #unity-container { width: 100%; height: 100%; }
    #unity-canvas { width: 100%; height: 100%; background: #0a0a0f; }
    #unity-loading-bar, #unity-logo, #unity-progress-bar-empty, #unity-progress-bar-full,
    #unity-warning, .unity-mobile-warning { display: none !important; }
    .unity-splash-screen, #splash-screen,
    [class*="splash"], [id*="splash"] { display: none !important; }
    #splash-cover {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0f; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #splash-cover.hidden { opacity: 0; }
    #splash-cover span { color: #0DBD8B; font-family: sans-serif; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="splash-cover"><span>PING</span></div>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <script>
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/WebGLBuild.loader.js";
    var config = {
      dataUrl: buildUrl + "/WebGLBuild.data",
      frameworkUrl: buildUrl + "/WebGLBuild.framework.js",
      codeUrl: buildUrl + "/WebGLBuild.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "PingGames",
      productName: "PingPong",
      productVersion: "1.0",
      showBanner: function () {},
    };

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function () {
      createUnityInstance(document.querySelector("#unity-canvas"), config, function (progress) {
      }).then(function (unityInstance) {
        window.unityInstance = unityInstance;
        var cover = document.getElementById('splash-cover');
        if (cover) {
          cover.classList.add('hidden');
          setTimeout(function () { cover.remove(); }, 500);
        }
      }).catch(function (message) {
        console.error("[PingPong] Unity init failed:", message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
